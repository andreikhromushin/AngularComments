<article class="card" [class.is-guest]="comment().isGuest">
  <div class="avatar" [style.background]="avatarBackground()" aria-hidden="true">
    {{ avatarLetter() }}
  </div>

  <div class="body">
    <header class="meta">
      <h3 class="author">
        {{ comment().author }}
        @if (comment().isGuest) {
          <span class="badge">you</span>
        }
      </h3>
      <time class="time" [attr.datetime]="datetimeIso()">{{ timeAgoLabel() }}</time>
    </header>

    <p class="text">{{ comment().body }}</p>

    <footer class="actions">
      <button
        type="button"
        class="action like"
        [class.liked]="comment().likedByMe"
        (click)="onLike()"
        [attr.aria-pressed]="comment().likedByMe"
        [attr.aria-label]="
          (comment().likedByMe ? 'Unlike' : 'Like') + ', ' + comment().likes + ' likes'
        "
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 21s-6.5-4.4-9-8.5C.5 8 3 4 6.5 4c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3C21 4 23.5 8 21 12.5 18.5 16.6 12 21 12 21z"
          />
        </svg>
        <span class="count">{{ comment().likes }}</span>
      </button>

      <button
        type="button"
        class="action reply"
        [class.active]="isReplying()"
        (click)="onReply()"
        [attr.aria-expanded]="isReplying()"
        [attr.aria-controls]="composerId()"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M9 17 4 12l5-5m-5 5h11a4 4 0 0 1 4 4v3"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>{{ isReplying() ? "Close" : "Reply" }}</span>
      </button>
    </footer>
  </div>
</article>
